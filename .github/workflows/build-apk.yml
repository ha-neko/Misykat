name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install npm dependencies
        run: npm ci

      - name: Expo prebuild (generate android)
        run: npx expo prebuild --clean --no-install

      - name: Build debug APKs (per-architecture)
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: Misykat-Debug-APKs
          path: |
            android/app/build/outputs/apk/debug/app-*-debug.apk
          retention-days: 30

      - name: Build release AAB (for Google Play)
        run: cd android && ./gradlew bundleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: Misykat-Release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build release APKs (per-architecture, for sideload)
        run: cd android && ./gradlew assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: Misykat-Release-APKs
          path: |
            android/app/build/outputs/apk/release/app-*-release.apk
          retention-days: 30

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: nightly
          name: Nightly Build
          body: |
            Build otomatis dari commit `${{ github.sha }}`.

            APK siap di-sideload langsung tanpa perlu login.
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            android/app/build/outputs/apk/release/app-universal-release.apk
            android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
            android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk
            android/app/build/outputs/apk/release/app-x86_64-release.apk
          artifactContentType: application/vnd.android.package-archive
          removeArtifacts: true
